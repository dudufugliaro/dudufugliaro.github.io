<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sobre mim</title>

    <style>
        body {
            background-color:beige;
            margin: 40px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }
        .titulo {
            color:black;
            text-align: center;
        }
        .foto {
            width: 200px;
            border-radius: 50%;
            border: 3px solid #2c3e50;
            padding: 5px;
            display: block;
            margin: auto;
        }
        #nome {
            text-align: center;
            font-weight: bold;
        }
        .subtitulo {
            color:black;
        }
        .lista {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
        }
        .lista li {
            margin-bottom: 10px;
        }
        .lista li:hover {
            color: #e74c3c;
        }
    </style>
</head> 
<body>

    <div class="container">

        <h1 class="titulo">Sobre mim</h1>

        <img class="foto" src="https://github.com/dudufugliaro.png" 
            alt="Foto de perfil" 
            width="200" 
            style="border-radius: 50%;">   

        <p id="nome" >Meu nome é Luiz Eduardo Fugliaro</p>

        <h2 class="subtitulo" >Meus interesses</h2>
        <ul class="lista" >
            <li>Programação Web</li>
            <li>Academia</li>
            <li>Jogos</li>
        </ul>

    </div>
</body>
